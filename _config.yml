# Site settings
title: Ying Li
url: "https://neuraliying.github.io"
repository: "NeuraLiying/NeuraLiying.github.io"

# Author
author:
  name: Ying Li
  desc: Researcher | Hangzhou, China
  email: liying06@westlake.edu.cn
  selfie: assets/img/you.jpg

# Social links (rendered as circular icons at the bottom of the page).
# Leave blank to hide. `email: true` enables the email icon using author.email.
social:
  email: true
  github: NeuraLiying
  google_scholar: citations?user=jIkHgFAAAAAJ&hl=zh-CN
  default_txt: "Follow On"

# Build settings
markdown: kramdown

# Assets
sass:
  sass_dir: _sass
  style: compressed

# Gems
plugins:
  - jekyll-paginate

# Permalinks
permalink: /:year-:month-:day/:title
paginate_path: "/portfolio/page:num/"
paginate: 5
exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "*.gem"
  - "LICENSE"
  - "README.md"
  - "Dockerfile"
  - "docker-compose.yaml"
  - "package.json"
  - "package-lock.json"
  - "node_modules"
  - "vendor"
  - "markdown_generator"
  - "talkmap"
  - "talkmap.py"
  - "talkmap.ipynb"
  - "talkmap_out.ipynb"
  - "scripts"
